name: Android CI Pro

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build FocusGuard APKs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Conceder permissão de execução ao gradlew
        run: chmod +x gradlew

      - name: Compilar APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Salvar APK Debug (Artefato)
        uses: actions/upload-artifact@v4
        with:
          name: focusguard-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Preparar Keystore de Release Seguro
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | tr -d '\n' | tr -d '\r' | base64 -d > ${{ github.workspace }}/release.jks

      - name: Compilar APK Release
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Remover Keystore Físico (Segurança)
        if: always()
        run: rm -f ${{ github.workspace }}/release.jks

      - name: Salvar APK Release (Artefato)
        uses: actions/upload-artifact@v4
        with:
          name: focusguard-release-apk
          path: app/build/outputs/apk/release/*.apk
