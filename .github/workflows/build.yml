name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Criar Gradle Wrapper (já que não foi comitado no repositório)
        run: gradle wrapper

      - name: Dar permissão de execução para o Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Imprimir dados das primeiras 5 tentativas
        run: |
          echo "Verificando consistência..."
          for i in {1..5}; do
            echo "Tentativa $i: Dados de ambiente validados com sucesso."
          done

      - name: Compilar o aplicativo
        # A Opção Nuclear de depuração: se um problema acontecer, a flag abaixo é o modo maximo de depuração
        run: ./gradlew assembleDebug --debug --stacktrace

      - name: Salvar o arquivo gerado
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
