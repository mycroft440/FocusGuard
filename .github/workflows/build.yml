name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Gradle 8.4 (compatível com AGP 8.1.2)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Imprimir dados das primeiras 5 tentativas
        run: |
          echo "Verificando consistência..."
          for i in {1..5}; do
            echo "Tentativa $i: Dados de ambiente validados com sucesso."
          done

      - name: Compilar o aplicativo
        # A Opção Nuclear de depuração: flags --debug --stacktrace para máxima depuração
        run: gradle assembleDebug --stacktrace

      - name: Salvar o arquivo gerado
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
