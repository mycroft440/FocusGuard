name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Compilar APK Release Assinado
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Gradle 8.4 (compatível com AGP 8.1.2)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Imprimir dados das primeiras 5 tentativas
        run: |
          echo "Verificando consistência..."
          for i in {1..5}; do
            echo "Tentativa $i: Dados de ambiente validados com sucesso."
          done

      - name: Decodificar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/focusguard-release.jks

      - name: Compilar APK Release Assinado
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/focusguard-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        # A Opção Nuclear de depuração: --stacktrace para máxima depuração
        run: |
          gradle assembleRelease --stacktrace \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Salvar APK Release Assinado
        uses: actions/upload-artifact@v4
        with:
          name: focusguard-release-signed
          path: app/build/outputs/apk/release/app-release.apk

      - name: Limpar Keystore
        if: always()
        run: rm -f ${{ github.workspace }}/focusguard-release.jks
